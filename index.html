<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Log - Vertical Optimized (Numpad)</title>
    <style>
        :root {
            --bg-color: #000000;
            --app-bg: #121212;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-blue: #0a84ff;
            --btn-bg: #2c2c2e;
            --btn-active: #48484a;
            --minus-red: #ff453a;
            --plus-green: #32d74b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: manipulation;
        }

        /* 限制最大寬度，讓 iPad 垂直時也能維持手機比例，防止按鈕過大 */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--app-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 頂部學生切換 */
        .tabs {
            display: flex;
            background-color: var(--card-bg);
        }
        .tab-btn {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: bold;
        }
        .tab-btn.active {
            color: var(--accent-blue);
            border-bottom: 3px solid var(--accent-blue);
        }

        /* 2x2 度數顯示區塊 (極大化防睇漏) */
        .display-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
        }
        .field-box {
            background-color: var(--card-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .field-box.active {
            border-color: var(--accent-blue);
            background-color: #1a2a3a;
        }
        .field-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: bold;
        }
        .field-value {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            min-height: 32px;
        }
        /* 顏色動態變化 */
        .val-minus { color: var(--minus-red); }
        .val-plus { color: var(--plus-green); }

        /* 正負號專屬控制行 (SPH 專用) */
        .sign-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 15px 10px 15px;
        }
        .sign-btn {
            padding: 12px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            color: white;
            opacity: 0.3; /* 預設半透明，可用時變亮 */
        }
        .sign-btn.active-plus {
            background-color: var(--plus-green);
            opacity: 1;
        }
        .sign-btn.active-minus {
            background-color: var(--minus-red);
            opacity: 1;
        }

        /* 標準計算機 Numpad + 右側小數點 */
        .numpad-container {
            padding: 0 15px 15px 15px;
            flex-grow: 1;
        }
        .numpad-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1.2fr; /* 右側小數點稍微寬一點 */
            gap: 10px;
        }
        .num-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: none;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 500;
            height: 65px;
        }
        .num-btn:active {
            background-color: var(--btn-active);
        }
        .num-btn.special {
            background-color: #323234;
            color: var(--accent-blue);
            font-size: 20px;
            font-weight: bold;
        }
        .num-btn.action {
            background-color: #3a3a3c;
            font-size: 18px;
        }
        .num-btn.next-btn {
            background-color: var(--accent-blue);
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <button class="tab-btn active">Student A</button>
        <button class="tab-btn">Student B</button>
        <button class="tab-btn">Student C</button>
    </div>

    <div class="display-area">
        <div class="field-box active" id="box-sph" onclick="setActive('sph')">
            <div class="field-label">SPH (球面)</div>
            <div class="field-value" id="val-sph"></div>
        </div>
        <div class="field-box" id="box-cyl" onclick="setActive('cyl')">
            <div class="field-label">CYL (散光)</div>
            <div class="field-value" id="val-cyl">-</div>
        </div>
        <div class="field-box" id="box-axis" onclick="setActive('axis')">
            <div class="field-label">AXIS (軸線)</div>
            <div class="field-value" id="val-axis"></div>
        </div>
        <div class="field-box" id="box-add" onclick="setActive('add')">
            <div class="field-label">ADD (老花)</div>
            <div class="field-value" id="val-add">+</div>
        </div>
    </div>

    <div class="sign-row">
        <button class="sign-btn" id="btn-plus" onclick="forceSign('+')">＋ (正數)</button>
        <button class="sign-btn" id="btn-minus" onclick="forceSign('-')">－ (負數)</button>
    </div>

    <div class="numpad-container">
        <div class="numpad-grid">
            <button class="num-btn" onclick="input('7')">7</button>
            <button class="num-btn" onclick="input('8')">8</button>
            <button class="num-btn" onclick="input('9')">9</button>
            <button class="num-btn special" onclick="inputDec('.00')">.00</button>

            <button class="num-btn" onclick="input('4')">4</button>
            <button class="num-btn" onclick="input('5')">5</button>
            <button class="num-btn" onclick="input('6')">6</button>
            <button class="num-btn special" onclick="inputDec('.25')">.25</button>

            <button class="num-btn" onclick="input('1')">1</button>
            <button class="num-btn" onclick="input('2')">2</button>
            <button class="num-btn" onclick="input('3')">3</button>
            <button class="num-btn special" onclick="inputDec('.50')">.50</button>

            <button class="num-btn action" onclick="clearField()">清除</button>
            <button class="num-btn" onclick="input('0')">0</button>
            <button class="num-btn next-btn" onclick="nextField()">跳下一格</button>
            <button class="num-btn special" onclick="inputDec('.75')">.75</button>
        </div>
    </div>
</div>

<script>
    let currentField = 'sph';
    const fields = ['sph', 'cyl', 'axis', 'add'];
    
    // 預設狀態：CYL 永遠為負，ADD 永遠為正
    let data = { sph: '', cyl: '-', axis: '', add: '+' };

    // 初始化 UI
    updateDisplay();
    updateSignButtons();

    // 更新畫面顯示與顏色
    function updateDisplay() {
        fields.forEach(field => {
            let val = data[field];
            let el = document.getElementById('val-' + field);
            el.innerText = val;
            
            // 顏色標示防睇漏眼
            el.className = 'field-value'; // reset
            if (val.includes('-')) el.classList.add('val-minus');
            if (val.includes('+')) el.classList.add('val-plus');
        });
    }

    // 更新正負號按鈕的亮起狀態
    function updateSignButtons() {
        let btnPlus = document.getElementById('btn-plus');
        let btnMinus = document.getElementById('btn-minus');
        
        btnPlus.className = 'sign-btn';
        btnMinus.className = 'sign-btn';

        if (currentField === 'cyl') {
            btnMinus.classList.add('active-minus');
        } else if (currentField === 'add') {
            btnPlus.classList.add('active-plus');
        } else if (currentField === 'sph') {
            btnPlus.classList.add('active-plus');
            btnMinus.classList.add('active-minus');
        }
    }

    // 選擇活躍欄位
    function setActive(field) {
        formatField(currentField); 
        document.getElementById('box-' + currentField).classList.remove('active');
        currentField = field;
        document.getElementById('box-' + currentField).classList.add('active');
        
        if (currentField === 'cyl' && data.cyl === '') data.cyl = '-';
        if (currentField === 'add' && data.add === '') data.add = '+';
        
        updateDisplay();
        updateSignButtons();
    }

    // 強制設定正負號 (SPH 專用)
    function forceSign(sign) {
        if (currentField === 'axis') return;
        if (currentField === 'cyl' && sign === '+') return; 
        if (currentField === 'add' && sign === '-') return; 

        let val = data[currentField];
        if (val.startsWith('+') || val.startsWith('-')) {
            data[currentField] = sign + val.substring(1);
        } else {
            data[currentField] = sign + val;
        }
        updateDisplay();
    }

    // 輸入數字
    function input(num) {
        if (currentField === 'axis' && data[currentField].length >= 3) return;
        data[currentField] += num;
        updateDisplay();
    }

    // 輸入光學專屬小數
    function inputDec(dec) {
        if (currentField === 'axis') return;
        if (data[currentField].includes('.')) return; 
        
        if (data[currentField] === '' || data[currentField] === '+' || data[currentField] === '-') {
            data[currentField] += '0' + dec;
        } else {
            data[currentField] += dec;
        }
        updateDisplay();
    }

    // 清除當前欄位
    function clearField() {
        if (currentField === 'cyl') {
            data.cyl = '-';
        } else if (currentField === 'add') {
            data.add = '+';
        } else {
            data[currentField] = '';
        }
        updateDisplay();
    }

    // 離開欄位時自動補零與格式化
    function formatField(field) {
        let val = data[field];
        if (!val || val === '+' || val === '-') return;

        let num = parseFloat(val);
        if (isNaN(num)) return;

        if (field === 'axis') {
            if (num > 180) num = num % 180;
            if (num === 0) num = 180;
            data[field] = num.toString();
        } else {
            let formatted = Math.abs(num).toFixed(2);
            let sign = val.startsWith('-') ? '-' : '+';
            data[field] = sign + formatted;
        }
        updateDisplay();
    }

    function nextField() {
        let currentIndex = fields.indexOf(currentField);
        let nextIndex = (currentIndex + 1) % fields.length;
        setActive(fields[nextIndex]);
    }
</script>
</body>
</html>
