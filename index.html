<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Log - Optom</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-blue: #0a84ff;
            --btn-bg: #333333;
            --btn-active: #555555;
            --danger: #ff453a;
            --success: #30d158;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 80px; /* 預留底部空間 */
            touch-action: manipulation; /* 提升點擊反應速度 */
        }

        /* 頂部學生切換標籤 */
        .tabs {
            display: flex;
            background-color: var(--card-bg);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        .tab-btn {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: bold;
        }
        .tab-btn.active {
            color: var(--accent-blue);
            border-bottom: 3px solid var(--accent-blue);
        }

        /* 內容區塊 */
        .section {
            background-color: var(--card-bg);
            margin: 15px;
            padding: 15px;
            border-radius: 12px;
        }
        h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--text-muted);
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        /* 增減器 (Stepper) UI */
        .stepper-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .stepper-label {
            font-size: 16px;
            font-weight: bold;
            width: 60px;
        }
        .stepper-controls {
            display: flex;
            align-items: center;
            background-color: var(--bg-color);
            border-radius: 8px;
            overflow: hidden;
        }
        .stepper-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: none;
            width: 50px;
            height: 44px; /* iOS 建議最小觸控高度 */
            font-size: 20px;
            font-weight: bold;
        }
        .stepper-btn:active {
            background-color: var(--btn-active);
        }
        .stepper-value {
            width: 70px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
        }

        /* 快捷標籤 (Quick Tags) */
        .tags-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .tag-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .tag-btn.active {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        .tag-btn.success {
            background-color: var(--success);
            color: #000;
            border-color: var(--success);
        }

        /* 底部操作按鈕 */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: center;
        }
        .sync-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('A')">Student A</button>
        <button class="tab-btn" onclick="switchTab('B')">Student B</button>
        <button class="tab-btn" onclick="switchTab('C')">Student C</button>
    </div>

    <div class="section" id="golden-standard">
        <h2>導師標準度數 (Right Eye 示範)</h2>
        
        <div class="stepper-row">
            <div class="stepper-label">SPH</div>
            <div class="stepper-controls">
                <button class="stepper-btn" onclick="updateValue('sph', -0.25)">-</button>
                <div class="stepper-value" id="val-sph">0.00</div>
                <button class="stepper-btn" onclick="updateValue('sph', 0.25)">+</button>
            </div>
        </div>

        <div class="stepper-row">
            <div class="stepper-label">CYL</div>
            <div class="stepper-controls">
                <button class="stepper-btn" onclick="updateValue('cyl', -0.25)">-</button>
                <div class="stepper-value" id="val-cyl">0.00</div>
                <button class="stepper-btn" onclick="updateValue('cyl', 0.25)">+</button>
            </div>
        </div>

        <div class="stepper-row">
            <div class="stepper-label">AXIS</div>
            <div class="stepper-controls">
                <button class="stepper-btn" onclick="updateValue('axis', -5)">-</button>
                <div class="stepper-value" id="val-axis">180</div>
                <button class="stepper-btn" onclick="updateValue('axis', 5)">+</button>
            </div>
        </div>
    </div>

    <div class="section" id="student-record">
        <h2>當前學生表現紀錄</h2>
        <div class="tags-grid">
            <button class="tag-btn success" id="btn-match" onclick="toggleTag(this)">度數與導師一致</button>
            <button class="tag-btn" onclick="toggleTag(this)">SPH 偏正 (Over-plus)</button>
            <button class="tag-btn" onclick="toggleTag(this)">SPH 偏負 (Over-minus)</button>
            <button class="tag-btn" onclick="toggleTag(this)">散光軸線 > 10度誤差</button>
        </div>
        
        <h2 style="margin-top: 20px;">眼睛健康 / Cover Test</h2>
        <div class="tags-grid">
            <button class="tag-btn success" onclick="toggleTag(this)">全正常 (WNL)</button>
            <button class="tag-btn" onclick="toggleTag(this)">Exophoria 隱外斜</button>
            <button class="tag-btn" onclick="toggleTag(this)">Esophoria 隱內斜</button>
            <button class="tag-btn" onclick="toggleTag(this)">SPK 角膜點狀破損</button>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="sync-btn" onclick="generatePIN()">產生同步碼 (下一步實作)</button>
    </div>

    <script>
        // 初始化數值
        let values = {
            sph: 0.00,
            cyl: 0.00,
            axis: 180
        };

        // 格式化數字 (保留兩位小數並加上正負號)
        function formatNumber(num, isAxis = false) {
            if (isAxis) {
                if (num <= 0) return 180;
                if (num > 180) return num - 180;
                return num;
            }
            let formatted = num.toFixed(2);
            return num > 0 ? '+' + formatted : formatted;
        }

        // 更新度數數值
        function updateValue(type, change) {
            values[type] += change;
            
            // 軸線特殊處理 (0-180度)
            if (type === 'axis') {
                values[type] = formatNumber(values[type], true);
                document.getElementById('val-' + type).innerText = values[type];
            } else {
                document.getElementById('val-' + type).innerText = formatNumber(values[type]);
            }
        }

        // 切換按鈕的活躍狀態 (標籤點擊)
        function toggleTag(btn) {
            btn.classList.toggle('active');
            // 若點擊非一致/非正常的按鈕，可自動取消 success 按鈕的高亮 (進階邏輯可在後續加入)
        }

        // 切換學生 Tabs
        function switchTab(student) {
            // 更新 Tab UI
            let tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            // 這裡未來會加入讀取該學生暫存資料的邏輯
            console.log("切換至 Student " + student);
        }

        function generatePIN() {
            alert("介面測試成功！在下一步，這裡將會生成一組 4 位數 PIN 碼，並把資料送到 Supabase。");
        }
    </script>
</body>
</html>
